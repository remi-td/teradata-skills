services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    env_file:
      - ../backend/.env
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        VITE_API_URL: /api
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
